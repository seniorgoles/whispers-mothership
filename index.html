<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whispers of Aurorachrome - Mothership</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Tag Manager -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZV7K4PCTR8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZV7K4PCTR8');
    </script>
</head>
<body>

    <!-- Main Container styled like a museum display kiosk -->
    <main id="mothership-terminal">
        
        <!-- Header: Top-most Channel Selector (Future-Proofed) -->
        <header id="terminal-header">
            <div class="logo-area">
                <h1>Whispers of Aurorachrome</h1>
                <p class="status-indicator">SYSTEMS: ONLINE // JUNCTION 5.1</p>
            </div>
            <!-- Channel Switcher (Main Channel, eventually Jaxx, Dax, Echo) -->
            <div id="channel-selector">
                <button class="channel-btn active" data-channel="main">Main Channel</button>
                <!-- Prepped for future channels: -->
                <!-- <button class="channel-btn" data-channel="jaxx">Jaxx Feed</button> -->
                <!-- <button class="channel-btn" data-channel="dax">Dax Feed</button> -->
                <!-- <button class="channel-btn" data-channel="echo">Echo Feed</button> -->
            </div>
        </header>

        <!-- THE MAIN DISPLAY SCREEN (Displays one active thing at a time) -->
        <section id="museum-display-screen">
            <div id="display-content-viewport">
                <div class="terminal-welcome">
                    <img src="images/reno1.jpeg" class="centered-image">
                    <h2>Welcome to the Aurorachrome Archives</h2>
                    <p>Select a Category, choose a Series/Playlist, and load your file.</p>
                </div>
            </div>
            <h3 id="display-now-playing">System Idle...</h3>
        </section>

        <!-- THE CONTROL CONSOLE (Hierarchical Directory) -->
        <section id="terminal-controls">
            
            <!-- LEVEL 1: Category Selector (Now at the top of the controls) -->
            <nav id="console-categories">
                <button class="console-tab active" data-category="videos">Videos</button>
                <button class="console-tab" data-category="podcasts">Podcasts</button>
                <button class="console-tab" data-category="the_static">The Static (Tabloid)</button>
                <button class="console-tab" data-category="lab">The Lab (Apps)</button>
            </nav>

            <!-- LEVEL 2: Playlist / Sub-Selection Menu (Dynamic buttons built by JS) -->
            <div id="playlist-selector-bar">
                <span class="selector-label">Select Series:</span>
                <div id="playlist-buttons-container">
                    <!-- JS will insert buttons like "Season 1", "Shorts", "Issue #1" here -->
                </div>
            </div>

            <!-- LEVEL 3: Episode / File Selection Grid -->
            <div id="terminal-menu-wrapper">
                <div class="menu-header-row">
                    <span class="selector-label">Select Episode / File:</span>
                    <!-- DYNAMIC EPISODE PAGINATION CONTROLS -->
                    <div id="menu-pagination-controls" class="pagination-controls" style="display: none;">
                        <button id="menu-prev-btn" class="pag-btn">&lt; Prev</button>
                        <span id="menu-page-indicator" class="page-indicator">Page 1 of 1</span>
                        <button id="menu-next-btn" class="pag-btn">Next &gt;</button>
                    </div>
                </div>
                <div id="terminal-menu-list" class="menu-grid">
                    <!-- Dynamic buttons for individual videos/posts go here -->
                </div>
              </div>  
        </section>

    </main>

    <!-- Unified, hidden audio players for ambient sound if still desired -->
    <div id="ambient-audio-station">
        <audio id="audio-rain" loop src="audio/rain.mp3"></audio>
        <audio id="audio-fireplace" loop src="audio/fireplace.mp3"></audio>
    </div>

   <!-- YouTube & Confetti scripts -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
